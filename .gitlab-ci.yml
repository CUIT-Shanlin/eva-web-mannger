# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

variables:
  DOCKER_TLS_CERTDIR: ""
  EVA_VERSION: 1.75-SNAPSHOT

stages: # List of stages for jobs, and their order of execution
  - build
  - publish
  - recreate

build: # This job runs in the build stage, which runs first.
  stage: build
  image: $HARBOR_HOST/library/node:18.20-alpine
  script:
    - npm config set registry https://registry.npmmirror.com
    - npm install --force
    - npm run build:test
  cache:
    key: "${CI_PROJECT_ID}"
    paths:
      - node_modules
  artifacts:
    paths:
      - dist
    expire_in: 1 days
  only:
    refs:
      - master
      - master-test

publish: # This job runs in the deploy stage.
  stage: publish # It only runs when *both* jobs in the test stage complete successfully.
  image: $HARBOR_HOST/library/docker:23.0.2-alpine3.17
  services:
    - name: $HARBOR_HOST/library/docker:23.0.2-dind-alpine3.17
      command: ["--tls=false"]
      alias: docker
  before_script:
    - until docker info; do sleep 5s; done
  script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_URL
    - docker build -t eva-management-frontend:$EVA_VERSION .
    - docker tag eva-management-frontend:$EVA_VERSION $HARBOR_HOST/eva-system/eva-management-frontend:$EVA_VERSION
    - docker push $HARBOR_HOST/eva-system/eva-management-frontend:$EVA_VERSION
    - docker tag eva-management-frontend:$EVA_VERSION $HARBOR_HOST/eva-system/eva-management-frontend
    - docker push $HARBOR_HOST/eva-system/eva-management-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == 'master'

publish-test: # This job runs in the deploy stage.
  stage: publish # It only runs when *both* jobs in the test stage complete successfully.
  image: $HARBOR_HOST/library/docker:23.0.2-alpine3.17
  services:
    - name: $HARBOR_HOST/library/docker:23.0.2-dind-alpine3.17
      command: ["--tls=false"]
      alias: docker
  before_script:
    - until docker info; do sleep 5s; done
  script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_URL
    - docker build -t eva-management-frontend-test:$EVA_VERSION .
    - docker tag eva-management-frontend-test:$EVA_VERSION $HARBOR_HOST/eva-system/eva-management-frontend-test:$EVA_VERSION
    - docker push $HARBOR_HOST/eva-system/eva-management-frontend-test:$EVA_VERSION
    - docker tag eva-management-frontend-test:$EVA_VERSION $HARBOR_HOST/eva-system/eva-management-frontend-test
    - docker push $HARBOR_HOST/eva-system/eva-management-frontend-test
  rules:
    - if: $CI_COMMIT_BRANCH == 'master-test'

recreate:
  image: $HARBOR_HOST/library/curl:8.9.1
  stage: recreate
  script:
    - curl -X POST $PORTAINER_UPDATE_URL
  rules:
    - if: $CI_COMMIT_BRANCH == 'master'

recreate-test:
  image: $HARBOR_HOST/library/curl:8.9.1
  stage: recreate
  script:
    - curl -X POST $PORTAINER_UPDATE_TEST_URL
  rules:
    - if: $CI_COMMIT_BRANCH == 'master-test'
