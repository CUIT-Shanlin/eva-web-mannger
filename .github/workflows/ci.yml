name: Build and Publish

on:
  push:
    branches:
      - master
      - master-test
  workflow_dispatch:

env:
  EVA_VERSION: "1.92-SNAPSHOT"
  EVA_TEST_VERSION: "1.91"
  NODE_VERSION: "18.20"
  NPM_REGISTRY: https://registry.npmmirror.com
  DIST_ARTIFACT_NAME: frontend-dist
  HARBOR_HOST: ${{ secrets.HARBOR_HOST }}
  HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
  PORTAINER_UPDATE_TEST_URL: ${{ secrets.PORTAINER_UPDATE_TEST_URL }}
  PROD_IMAGE: ${{ format('{0}/eva-system/eva-management-frontend', secrets.HARBOR_HOST) }}
  TEST_IMAGE: ${{ format('{0}/eva-system/eva-management-frontend-test', secrets.HARBOR_HOST) }}

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm registry
        run: npm config set registry ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: npm install --force

      - name: Build (test target)
        run: npm run build:test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: dist
          retention-days: 1
          if-no-files-found: error

  publish-prod:
    name: Publish Production Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      PROD_VERSION_TAG: ${{ format('{0}:{1}', env.PROD_IMAGE, env.EVA_VERSION) }}
      PROD_LATEST_TAG: ${{ format('{0}:latest', env.PROD_IMAGE) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.PROD_LATEST_TAG }}
          cache-to: type=inline
          tags: |
            ${{ env.PROD_VERSION_TAG }}
            ${{ env.PROD_LATEST_TAG }}

  publish-test:
    name: Publish Test Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master-test'
    env:
      TEST_VERSION_TAG: ${{ format('{0}:{1}', env.TEST_IMAGE, env.EVA_TEST_VERSION) }}
      TEST_LATEST_TAG: ${{ format('{0}:latest', env.TEST_IMAGE) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DIST_ARTIFACT_NAME }}
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.TEST_LATEST_TAG }}
          cache-to: type=inline
          tags: |
            ${{ env.TEST_VERSION_TAG }}
            ${{ env.TEST_LATEST_TAG }}

  # recreate-prod:
  #   name: Trigger Portainer Update (Prod)
  #   runs-on: ubuntu-latest
  #   needs: publish-prod
  #   if: github.ref == 'refs/heads/master'
  #   steps:
  #     - name: Call Portainer webhook
  #       run: |
  #         if [ -z "${PORTAINER_UPDATE_URL}" ]; then
  #           echo "PORTAINER_UPDATE_URL is not set." >&2
  #           exit 1
  #         fi
  #         curl --fail --show-error -X POST "${PORTAINER_UPDATE_URL}"

  recreate-test:
    name: Trigger Portainer Update (Test)
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-test
    if: github.ref == 'refs/heads/master-test'
    steps:
      - name: Call Portainer webhook
        run: |
          if [ -z "${PORTAINER_UPDATE_TEST_URL}" ]; then
            echo "PORTAINER_UPDATE_TEST_URL is not set." >&2
            exit 1
          fi
          curl --fail --show-error -X POST "${PORTAINER_UPDATE_TEST_URL}"
