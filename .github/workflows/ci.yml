name: CI

on:
  push:
    branches:
      - master
      - master-test
  workflow_dispatch:

env:
  EVA_VERSION: "1.91-SNAPSHOT"
  EVA_TEST_VERSION: "1.91"
  IMAGE_NAME: eva-management-frontend
  IMAGE_TEST_NAME: eva-management-frontend-test
  NODE_VERSION: "18.20"
  NPM_REGISTRY: https://registry.npmmirror.com

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm registry
        run: npm config set registry ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: npm install --force

      - name: Build (test target)
        run: npm run build:test

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  publish-prod:
    name: Publish production image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == refs/heads/master
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare production image tags
        run: |
          {
            echo "PROD_IMAGE=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_NAME }}";
            echo "PROD_VERSION_TAG=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_NAME }}:${{ env.EVA_VERSION }}";
            echo "PROD_LATEST_TAG=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_NAME }}:latest";
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.PROD_LATEST_TAG }}
          cache-to: type=inline
          tags: |
            ${{ env.PROD_VERSION_TAG }}
            ${{ env.PROD_LATEST_TAG }}

  publish-test:
    name: Publish test image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == refs/heads/master-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare test image tags
        run: |
          {
            echo "TEST_IMAGE=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_TEST_NAME }}";
            echo "TEST_VERSION_TAG=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_TEST_NAME }}:${{ env.EVA_TEST_VERSION }}";
            echo "TEST_LATEST_TAG=${{ secrets.HARBOR_HOST }}/eva-system/${{ env.IMAGE_TEST_NAME }}:latest";
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=${{ env.TEST_LATEST_TAG }}
          cache-to: type=inline
          tags: |
            ${{ env.TEST_VERSION_TAG }}
            ${{ env.TEST_LATEST_TAG }}

  recreate-prod:
    name: Recreate production service
    runs-on: ubuntu-latest
    needs: publish-prod
    if: github.ref == refs/heads/master
    steps:
      - name: Trigger Portainer update
        env:
          PORTAINER_UPDATE_URL: ${{ secrets.PORTAINER_UPDATE_URL }}
        run: |
          curl --fail --show-error -X POST "$PORTAINER_UPDATE_URL"

  recreate-test:
    name: Recreate test service
    runs-on: ubuntu-latest
    needs: publish-test
    if: github.ref == refs/heads/master-test
    steps:
      - name: Trigger Portainer update (test)
        env:
          PORTAINER_UPDATE_TEST_URL: ${{ secrets.PORTAINER_UPDATE_TEST_URL }}
        run: |
          curl --fail --show-error -X POST "$PORTAINER_UPDATE_TEST_URL"
